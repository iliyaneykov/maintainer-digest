name: Maintainer digest

on:
  workflow_dispatch:
  schedule:
    - cron: '0 9 * * 1'

permissions:
  contents: read
  issues: read
  pull-requests: read

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install
        run: python -m pip install .
      - name: Generate digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          maintainer-digest digest --repo "$GITHUB_REPOSITORY" --out MAINTAINER_DIGEST.md
          maintainer-digest prompt --repo "$GITHUB_REPOSITORY" --out codex-triage-prompt.txt
      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: maintainer-digest
          path: |
            MAINTAINER_DIGEST.md
            codex-triage-prompt.txt
